<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>S22 提案預覽</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet">
<style>
body{margin:0;background:#555;font-family:"Noto Sans TC",sans-serif;padding:24px}
.slide{width:min(96vw,1180px);aspect-ratio:16/9;margin:0 auto;background:linear-gradient(135deg,#EFF6F1,#D6E6DC);border-radius:14px;box-shadow:0 10px 40px rgba(0,0,0,.3);padding:4.5vh 4vw;box-sizing:border-box;display:flex;flex-direction:column}
h2{font-family:"Noto Serif TC",serif;color:#862633;font-size:clamp(1.6rem,2.9vw,2.5rem);margin:0 0 .5em;border-bottom:3px solid #D4AF37;padding-bottom:.15em;display:inline-block}
.row{display:grid;grid-template-columns:1fr 1fr;gap:2.6vw;align-items:center;flex:1}
.row img{width:100%;max-height:58vh;object-fit:cover;border-radius:12px;box-shadow:0 6px 20px rgba(0,0,0,.18)}
.chips{display:flex;flex-wrap:wrap;gap:.7em;align-content:center}
.chip{background:#fff;border:1px solid #cde0d4;border-left:5px solid #862633;border-radius:10px;padding:.5em .9em;font-size:clamp(1.05rem,1.55vw,1.5rem);font-weight:700;color:#2b2b2b;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.cap{margin-top:.5em;color:#5a6b60;font-style:italic;font-size:clamp(.9rem,1.2vw,1.1rem)}
</style></head>
<body>
<div class="slide">
  <h2>一般人對美好人生的想像（三）：人生座右銘</h2>
  <div class="row">
    <div>
      <img src="images/motto_board.jpg" alt="Difficult roads lead to beautiful destinations">
      <div class="cap">"Difficult roads lead to beautiful destinations."</div>
    </div>
    <div class="chips">
      <span class="chip">有志者，事竟成</span>
      <span class="chip">知識就是力量</span>
      <span class="chip">一日之計在於晨</span>
      <span class="chip">要怎麼收穫，就要先怎麼栽</span>
      <span class="chip">天下無難事，只怕有心人</span>
      <span class="chip">失敗為成功之母</span>
      <span class="chip">一分耕耘，一分收穫</span>
      <span class="chip">天道酬勤</span>
    </div>
  </div>
</div>
</body></html>
